<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=yes" />

<title>Formulario Boda</title>

<link rel="stylesheet" href="css/basic.css">

<script src="js/jquery.min.1.7.js"></script>
<script src="js/modernizr.2.5.3.min.js"></script>
<script src="js/turn.min.js"></script>

</head>

<body>

<div class="flipbook-viewport">
    <div class="container">
        <div class="flipbook">

            <!-- FILMINA 1 -->
            <div class="page">
                <div class="topblur">Haga click en la esquina para avanzar ->></div>

                <div class="blur">
                    <h1>Te invitamos a nuestra boda.</h1>
                </div>

                <div class="bottomblur">Haga click en la esquina para avanzar ->></div>
            </div>

            <!-- FILMINA 2 -->
            <div class="page">
                <div class="blur">
                    <h2>Filmina 2</h2>
                </div>
            </div>

            <!-- FILMINA 3 -->
            <div class="page">
                <div class="blur">
                    <h2>Filmina 3</h2>
                </div>
            </div>

            <!-- FILMINA 4 -->
            <div class="page">
                <div class="blur">
                    <h2>Filmina 4</h2>
                </div>
            </div>

            <!-- FILMINA 5 -->
            <div class="page">
                <div class="blur">
                    <h2>Filmina 5</h2>
                </div>
            </div>

        </div>
    </div>
</div>

<script>

/* ======================
   CONFIG BACKGROUNDS
====================== */
const CONFIG = {

    UNIQUE_BACKGROUND: true,  // 🔥 CAMBIA AQUÍ

    GLOBAL_BG: "pics/kb05.jpg",

    PAGE_BACKGROUNDS: [
        "pics/kb05.jpg",
        "pics/kb01.jpg",
        "pics/kb02.jpg",
        "pics/kb03.jpg",
        "pics/kb04.jpg"
    ]

};

/* ======================
   INIT TURNJS
====================== */
function loadApp() {
    $('.flipbook').turn({
        width: 380,
        height: 640,
        elevation: 50,
        gradients: true,
        autoCenter: true,
        display: 'single'
    });
}

/* ======================
   APPLY BACKGROUNDS
====================== */
function applyBackgrounds() {

    $('.flipbook .page').each(function(index){

        let bg;

        if(CONFIG.UNIQUE_BACKGROUND){
            bg = CONFIG.PAGE_BACKGROUNDS[index];
        } else {
            bg = CONFIG.GLOBAL_BG;
        }

        $(this).css({
            backgroundImage: `url(${bg})`,
            backgroundSize: 'cover',
            backgroundPosition: 'center',
            backgroundRepeat: 'no-repeat'
        });

    });
}

/* ======================
   INIT
====================== */
$(document).ready(function () {
    loadApp();
    applyBackgrounds();
});

</script>

</body>
</html>
