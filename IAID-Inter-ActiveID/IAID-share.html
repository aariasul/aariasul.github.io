<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compartir Inter-ActiveID</title>

  <style>
    :root {
      --soft-ease: cubic-bezier(0.16, 1, 0.3, 1);
      --elastic-ease: cubic-bezier(0.34, 1.56, 0.64, 1);
      --purple: #5931EB;
      --green: #3BFF0A;
      --yellow: #FFD60A;
      --white: #ffffff;
      --black: #000000;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #000000;
      color: #ffffff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    body {
      background:
        radial-gradient(circle at 16% 0%, rgba(89, 49, 235, 0.24), transparent 32%),
        radial-gradient(circle at 90% 16%, rgba(59, 255, 10, 0.12), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(255, 214, 10, 0.08), transparent 34%),
        #000000;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* Fixed logo layer */
    .logo-stage {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
    }

    .logo-stage::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: clamp(209px, 37.4vh, 418px);
      background: linear-gradient(
        180deg,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) 60%,
        rgba(0,0,0,0.88) 75%,
        rgba(0,0,0,0) 100%
      );
      z-index: 25;
      pointer-events: none;
    }

    .logo-wrap {
      position: absolute;
      top: 20px;
      left: 50%;
      width: min(60vw, 920px);
      min-width: 180px;
      transform: translateX(-50%);
      z-index: 30;
      pointer-events: none;
      filter:
        drop-shadow(0 18px 70px rgba(0, 0, 0, 0.72))
        drop-shadow(0 0 30px rgba(89, 49, 235, 0.35));
    }

    .logo-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Main page */
    .page-shell {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      padding: 35vh 20px 70px;
    }

    .share-card {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: clamp(24px, 5vw, 44px);
      border: 1px solid rgba(255, 214, 10, 0.38);
      border-radius: 32px;
      background:
        radial-gradient(circle at 12% 0%, rgba(59, 255, 10, 0.16), transparent 34%),
        radial-gradient(circle at 92% 15%, rgba(255, 214, 10, 0.14), transparent 32%),
        linear-gradient(
          135deg,
          rgba(89, 49, 235, 0.34),
          rgba(12, 12, 18, 0.92) 58%,
          rgba(0, 0, 0, 0.96)
        );
      box-shadow:
        0 34px 110px rgba(0, 0, 0, 0.62),
        0 0 34px rgba(89, 49, 235, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(18px);
    }

    .share-card h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw, 48px);
      line-height: 1.05;
      letter-spacing: -0.05em;
      color: #ffffff;
      text-shadow:
        0 2px 18px rgba(0, 0, 0, 0.72),
        0 0 18px rgba(89, 49, 235, 0.5);
    }

    .share-card .intro {
      margin: 0 0 28px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 16px;
      line-height: 1.65;
    }

    .form-grid {
      display: grid;
      gap: 16px;
    }

    .field-group {
      display: grid;
      gap: 8px;
    }

    .field-group label {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.74);
    }

    input {
      width: 100%;
      min-height: 54px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.075);
      color: #ffffff;
      font: inherit;
      font-size: 16px;
      outline: none;
      transition:
        border-color 420ms var(--soft-ease),
        box-shadow 420ms var(--soft-ease),
        background 420ms var(--soft-ease);
    }

    input::placeholder {
      color: rgba(255,255,255,0.42);
    }

    input:focus {
      border-color: rgba(255, 214, 10, 0.52);
      background: rgba(255, 255, 255, 0.105);
      box-shadow:
        0 0 0 4px rgba(89, 49, 235, 0.22),
        0 0 28px rgba(255, 214, 10, 0.12);
    }

    .button-stack {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }

    .btn,
    button.btn {
      width: 100%;
      min-height: 54px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border: 1px solid rgba(255, 214, 10, 0.28);
      border-radius: 999px;
      background:
        linear-gradient(
          90deg,
          rgba(89, 49, 235, 0.82),
          rgba(59, 255, 10, 0.16),
          rgba(255, 214, 10, 0.24)
        );
      color: #ffffff;
      font: inherit;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      text-shadow: 0 2px 18px rgba(0,0,0,0.72);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.16),
        0 18px 48px rgba(0,0,0,0.32),
        0 0 26px rgba(89, 49, 235, 0.22);
      transition:
        transform 520ms var(--elastic-ease),
        border-color 420ms var(--soft-ease),
        background 520ms var(--soft-ease),
        box-shadow 520ms var(--soft-ease);
    }

    .btn:hover,
    button.btn:hover {
      transform: translateY(-3px) scale(1.018);
      border-color: rgba(255, 214, 10, 0.52);
      background:
        linear-gradient(
          90deg,
          rgba(89, 49, 235, 1),
          rgba(59, 255, 10, 0.24),
          rgba(255, 214, 10, 0.34)
        );
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.2),
        0 22px 58px rgba(0,0,0,0.42),
        0 0 34px rgba(89, 49, 235, 0.34),
        0 0 24px rgba(255, 214, 10, 0.16);
    }

    .btn.secondary {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.16);
      color: rgba(255,255,255,0.86);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 18px 48px rgba(0,0,0,0.25);
    }

    .hidden-btn {
      display: none;
    }

    .visible-btn {
      display: inline-flex;
    }

    .helper-text {
      margin: 22px 0 0;
      color: rgba(255,255,255,0.62);
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
    }

    .nav-buttons {
      width: min(100%, 760px);
      margin: 24px auto 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    @media (max-width: 760px) {
      .logo-stage::after {
        height: clamp(187px, 35.2vh, 374px);
        background: linear-gradient(
          180deg,
          rgba(0,0,0,1) 0%,
          rgba(0,0,0,1) 60%,
          rgba(0,0,0,0.86) 76%,
          rgba(0,0,0,0) 100%
        );
      }

      .logo-wrap {
        top: 20px;
        width: min(72vw, 560px);
      }

      .page-shell {
        padding: 32vh 16px 56px;
      }

      .share-card {
        border-radius: 28px;
      }

      .nav-buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="logo-stage" aria-hidden="true">
    <div class="logo-wrap">
      <img src="./Inter-ActiveID-logo.svg" alt="Inter-ActiveID logo" />
    </div>
  </div>

  <main class="page-shell">
    <section class="share-card">
      <h1>Comparta su Inter-ActiveID</h1>
      <p class="intro">
        Ingrese el nombre y el número de teléfono de la persona a quien desea enviarle su tarjeta interactiva.
      </p>

      <div class="form-grid">
        <div class="field-group">
          <label for="personName">Nombre</label>
          <input type="text" id="personName" placeholder="Nombre de la persona" autocomplete="name" />
        </div>

        <div class="field-group">
          <label for="phoneNumber">Teléfono</label>
          <input type="tel" id="phoneNumber" placeholder="Número de teléfono" autocomplete="tel" />
        </div>
      </div>

      <div class="button-stack">
        <button class="btn" type="button" onclick="generateLinks()">Generar enlaces</button>
        <a id="userWhatsappLink" class="hidden-btn btn" href="#" target="_blank">Enviar enlace IAID</a>
        <a id="fixedWhatsappLink" class="hidden-btn btn" href="#" target="_blank">Enviar PDF</a>
        <a id="fixedURLLink" class="hidden-btn btn" href="#" target="_blank">Enviar nombre y teléfono a mi celular</a>
      </div>

      <p class="helper-text">
        Los botones aparecerán después de generar los enlaces.
      </p>
    </section>

    <div class="nav-buttons">
      <button class="btn secondary" type="button" onclick="window.location.reload();">Refrescar / Refresh</button>
      <a href="./index.html" class="btn secondary" role="button">Volver / Go Back</a>
    </div>
  </main>

  <script src="./css/script.js"></script>
  <script src="./css/scriptlanguage.js"></script>

  <script>
    /* Safety fallback: keeps the page functional if ./css/script.js does not define generateLinks(). */
    if (typeof window.generateLinks !== "function") {
      window.generateLinks = function generateLinks() {
        const personName = document.getElementById("personName").value.trim();
        const phoneInput = document.getElementById("phoneNumber").value.trim();
        const phoneDigits = phoneInput.replace(/\D/g, "");
        const normalizedPhone = phoneDigits.length === 8 ? `506${phoneDigits}` : phoneDigits;

        const currentUrl = new URL("./index.html", window.location.href).href;
        const pdfUrl = new URL("./IAID-Orlando-Arroyo.pdf", window.location.href).href;
        const safeName = personName || "";

        const iaidMessage = encodeURIComponent(`Hola ${safeName}. Te comparto mi Tarjeta Interactiva de Negocios Inter-ActiveID: ${currentUrl}`);
        const pdfMessage = encodeURIComponent(`Hola ${safeName}. Te comparto el PDF de mi Inter-ActiveID: ${pdfUrl}`);
        const notifyMessage = encodeURIComponent(`Nuevo contacto interesado en Inter-ActiveID:\nNombre: ${safeName}\nTeléfono: ${phoneInput}`);

        const userWhatsappLink = document.getElementById("userWhatsappLink");
        const fixedWhatsappLink = document.getElementById("fixedWhatsappLink");
        const fixedURLLink = document.getElementById("fixedURLLink");

        if (normalizedPhone) {
          userWhatsappLink.href = `https://wa.me/${normalizedPhone}?text=${iaidMessage}`;
          fixedWhatsappLink.href = `https://wa.me/${normalizedPhone}?text=${pdfMessage}`;
        } else {
          userWhatsappLink.href = `https://wa.me/?text=${iaidMessage}`;
          fixedWhatsappLink.href = `https://wa.me/?text=${pdfMessage}`;
        }

        fixedURLLink.href = `https://wa.me/50684759315?text=${notifyMessage}`;

        [userWhatsappLink, fixedWhatsappLink, fixedURLLink].forEach((link) => {
          link.classList.remove("hidden-btn");
          link.classList.add("visible-btn");
        });
      };
    }
  </script>
</body>
</html>
