<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Config Builder DB</title>
  <link rel="stylesheet" href="./css/style.css" />
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="wrap">
    <!-- Toggle idioma -->
    <div class="top-actions" aria-label="Controles principales">
      <div class="language-toggle-wrap" aria-label="Selector de idioma">
        <span class="language-code">EN</span>
        <label id="languageSwitchLabel" class="switch" aria-label="Cambiar idioma">
          <input id="languageToggle" type="checkbox" aria-label="Cambiar entre español e inglés">
          <span class="slider" aria-hidden="true">
            <span class="knob">
              <span class="icon-host">
                <svg class="lang-icon lang-icon-en" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                  <text x="24" y="33" text-anchor="middle" font-size="32" font-weight="700">n</text>
                </svg>
                <svg class="lang-icon lang-icon-es" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                  <text x="24" y="33" text-anchor="middle" font-size="32" font-weight="700">ñ</text>
                </svg>
              </span>
            </span>
          </span>
        </label>
        <span class="language-code">ES</span>
      </div>
    </div>

    <!-- Sección de acceso -->
    <section class="card">
      <h2 class="center" id="accessTitle" data-i18n="accessTitle">Acceso</h2>
      <div class="stack">
        <label for="email" id="emailLabel" data-i18n="emailLabel">Email</label>
        <input type="text" id="email" placeholder="Correo electrónico" data-i18n="emailPlaceholder">

        <label for="password" id="passwordLabel" data-i18n="passwordLabel">Contraseña</label>
        <input type="password" id="password" placeholder="Contraseña" data-i18n="passwordPlaceholder">
      </div>
      <div class="btns">
        <button onclick="signUp()" id="signUpBtn" data-i18n="signUpBtn">Registrarse</button>
        <button onclick="signIn()" id="signInBtn" data-i18n="signInBtn">Iniciar Sesión</button>
      </div>
      <p class="muted center" id="loginMessage" data-i18n="loginMessage">Debes iniciar sesión para continuar</p>
    </section>

    <!-- Sección de configuración (oculta al inicio) -->
    <section class="card" id="dbConfig" hidden>
      <h2 class="center" id="configTitle" data-i18n="configTitle">Configuración de la Base de Datos</h2>
      <div class="stack">
        <label for="dbName" data-i18n="dbNameLabel">Nombre de la base de datos</label>
        <input type="text" id="dbName" placeholder="Ej: infomed_db" data-i18n="dbNamePlaceholder">

        <label for="tableName" data-i18n="tableNameLabel">Nombre de la tabla</label>
        <input type="text" id="tableName" placeholder="Ej: contactos" data-i18n="tableNamePlaceholder">

        <label for="fieldName" data-i18n="fieldNameLabel">Nombre del campo</label>
        <input type="text" id="fieldName" placeholder="Ej: telefono" data-i18n="fieldNamePlaceholder">
      </div>
      <div class="btns">
        <button onclick="saveConfig()" id="saveConfigBtn" data-i18n="saveConfigBtn">Guardar Configuración</button>
      </div>
    </section>

    <!-- Sección de perfil -->
    <section class="card" id="userProfile" hidden>
      <h2 id="profileTitle" data-i18n="profileTitle">Perfil de Usuario</h2>
      <div class="stack">
        <label for="name" id="nameLabel" data-i18n="nameLabel">Nombre</label>
        <input type="text" id="name" placeholder="Ej: Juan Pérez" data-i18n="namePlaceholder">

        <label for="phone" id="phoneLabel" data-i18n="phoneLabel">Teléfono</label>
        <input type="text" id="phone" placeholder="Ej: +506 8888 8888" data-i18n="phonePlaceholder">
      </div>
      <div class="btns">
        <button id="saveProfileBtn" data-i18n="saveProfileBtn">Guardar Perfil</button>
        <button id="logoutBtn" data-i18n="logoutBtn">Cerrar sesión</button>
      </div>
    </section>
  </main>

  <script>
    console.log("Script cargado correctamente");

    const { createClient } = supabase;
    const supabaseClient = createClient(
      'https://xuayajienpmmgzbqbcee.supabase.co', // <-- reemplazar
      'sb_publishable_qLE4nWSdJ02RJlo4HAn2QQ_tgx_YHrj'                         // <-- reemplazar
    );

    const DEFAULT_LANG = 'es';
    const STORAGE_KEY = 'builder_language';

    const i18n = {
      es: {
        documentLang: 'es',
        accessTitle: 'Acceso',
        emailLabel: 'Email',
        emailPlaceholder: 'Correo electrónico',
        passwordLabel: 'Contraseña',
        passwordPlaceholder: 'Contraseña',
        signUpBtn: 'Registrarse',
        signInBtn: 'Iniciar Sesión',
        loginMessage: 'Debes iniciar sesión para continuar',
        configTitle: 'Configuración de la Base de Datos',
        dbNameLabel: 'Nombre de la base de datos',
        dbNamePlaceholder: 'Ej: infomed_db',
        tableNameLabel: 'Nombre de la tabla',
        tableNamePlaceholder: 'Ej: contactos',
        fieldNameLabel: 'Nombre del campo',
        fieldNamePlaceholder: 'Ej: telefono',
        saveConfigBtn: 'Guardar Configuración',
        profileTitle: 'Perfil de Usuario',
        nameLabel: 'Nombre',
        namePlaceholder: 'Ej: Juan Pérez',
        phoneLabel: 'Teléfono',
        phonePlaceholder: 'Ej: +506 8888 8888',
        saveProfileBtn: 'Guardar Perfil',
        logoutBtn: 'Cerrar sesión',
        errorInvalidEmail: 'El correo electrónico no es válido',
        errorShortPassword: 'La contraseña debe tener al menos 8 caracteres'
      },
      en: {
        documentLang: 'en',
        accessTitle: 'Access',
        emailLabel: 'Email',
        emailPlaceholder: 'Email',
        passwordLabel: 'Password',
        passwordPlaceholder: 'Password',
        signUpBtn: 'Sign Up',
        signInBtn: 'Sign In',
        loginMessage: 'You must sign in to continue',
        configTitle: 'Database Configuration',
        dbNameLabel: 'Database name',
        dbNamePlaceholder: 'Ex: infomed_db',
        tableNameLabel: 'Table name',
        tableNamePlaceholder: 'Ex: contacts',
        fieldNameLabel: 'Field name',
        fieldNamePlaceholder: 'Ex: phone',
        saveConfigBtn: 'Save Configuration',
        profileTitle: 'User Profile',
        nameLabel: 'Name',
        namePlaceholder: 'Ex: John Smith',
        phoneLabel: 'Phone',
        phonePlaceholder: 'Ex: +1 555 123 4567',
        saveProfileBtn: 'Save Profile',
        logoutBtn: 'Log out',
        errorInvalidEmail: 'The email address is not valid',
        errorShortPassword: 'Password must be at least 8 characters long'
      }
    };

    let currentLang = getInitialLanguage();

    function getInitialLanguage(){
      const stored = localStorage.getItem(STORAGE_KEY);
      console.log("Idioma inicial guardado en localStorage:", stored);
      return i18n[stored] ? stored : DEFAULT_LANG;
    }

    function t(key){
      const dict = i18n[currentLang] || i18n[DEFAULT_LANG];
      return dict[key] || key;
    }

    function updateStaticTexts(){
      console.log("Actualizando textos al idioma:", currentLang);
      document.documentElement.lang = t('documentLang');
      document.querySelectorAll('[data-i18n]').forEach(el => {
		
		        const key = el.dataset.i18n;
        const translation = t(key);
        console.log("Elemento:", el.tagName, "id:", el.id, "key:", key, "translation:", translation);
        if(el.tagName === 'INPUT'){
          el.setAttribute('placeholder', translation);
        } else {
          el.textContent = translation;
        }
      });
    }

    function setLanguage(lang){
      if(!i18n[lang]) return;
      currentLang = lang;
      localStorage.setItem(STORAGE_KEY, lang);
      console.log("Idioma cambiado a:", lang);
      updateStaticTexts();
      updateLanguageToggle();
    }

    function updateLanguageToggle(){
      const toggle = document.getElementById('languageToggle');
      const switchEl = document.getElementById('languageSwitchLabel');
      if(!toggle || !switchEl) return;
      const isSpanish = currentLang === 'es';
      toggle.checked = isSpanish;
      switchEl.classList.toggle('is-on', isSpanish);
      console.log("Toggle sincronizado. checked:", toggle.checked, "idioma:", currentLang);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const toggle = document.getElementById('languageToggle');
      const switchEl = document.getElementById('languageSwitchLabel');
      if(toggle && switchEl){
        toggle.addEventListener('change', () => {
          console.log("Evento change del toggle. checked:", toggle.checked);
          setLanguage(toggle.checked ? 'es' : 'en');
        });
      }
      updateStaticTexts();
      updateLanguageToggle();
    });

// Supabase Auth
async function signUp(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();

  // Validación básica antes de llamar a Supabase
  if(!email || !email.includes('@')){
    alert('Por favor ingresa un correo válido.');
    return;
  }
  if(password.length < 8){
    alert('La contraseña debe tener al menos 8 caracteres.');
    return;
  }

  const { data, error } = await supabaseClient.auth.signUp({ email, password });
  
  if(error){
    // Mostrar el mensaje real de Supabase
    alert('Error al registrarse: ' + error.message);
    return;
  }

  alert('Usuario registrado correctamente. Ahora podés iniciar sesión.');
}

async function signIn(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  
  if(error){
    alert('Error al iniciar sesión: ' + error.message);
    return;
  }

  alert('Login exitoso');
  document.getElementById('dbConfig').hidden = false;
  document.getElementById('userProfile').hidden = false;
}

function saveConfig(){
  console.log("Guardando configuración...");
  alert('Config Saved');
}

  </script>
</body>
</html>
