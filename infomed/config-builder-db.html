<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Infomed - Registro Premium</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="wrap">
    <!-- Logo -->
    <img id="logoInline" class="infomed-logo-inline" src="infomed.svg" alt="Infomed | Emergency Contacts">

    <!-- Toggle de idioma -->
    <div class="language-toggle-wrap">
      <span class="language-code">ES</span>
      <label class="switch">
        <input type="checkbox" id="langToggle">
        <span class="slider">
          <span class="knob">
            <span class="icon-host">
              <span class="lang-icon lang-icon-en">EN</span>
              <span class="lang-icon lang-icon-es">ES</span>
            </span>
          </span>
        </span>
      </label>
      <span class="language-code">EN</span>
    </div>

    <!-- Login -->
    <div class="card" id="auth-card">
      <h2 class="center" data-es="Acceso" data-en="Access">Acceso</h2>
      <div class="stack">
        <label data-es="Email" data-en="Email">Email</label>
        <input type="email" id="email" placeholder="tu@email.com">
        <label data-es="Contraseña" data-en="Password">Contraseña</label>
        <input type="password" id="password" placeholder="********">
      </div>
      <div class="btns">
        <button onclick="signUp()" data-es="Registrarse" data-en="Sign Up">Registrarse</button>
        <button onclick="signIn()" data-es="Iniciar Sesión" data-en="Sign In">Iniciar Sesión</button>
      </div>
      <p class="muted center" data-es="Debes iniciar sesión para continuar" data-en="You must sign in to continue">Debes iniciar sesión para continuar</p>
    </div>

    <!-- Formulario -->
    <form id="miFormulario" class="card" style="display:none;">
      <h2 class="center" data-es="Datos del Usuario" data-en="User Data">Datos del Usuario</h2>
      <input type="text" id="nombre_es" data-es="Nombre en Español" data-en="Name in Spanish" placeholder="Nombre en Español" required>
      <input type="text" id="nombre_en" data-es="Nombre en Inglés" data-en="Name in English" placeholder="Nombre en Inglés">
      <input type="text" id="cedula" data-es="Cédula" data-en="ID Number" placeholder="Cédula" required>

      <h2 class="center" data-es="Contactos" data-en="Contacts">Contactos</h2>
      <div id="contactos" class="stack"></div>
      <button type="button" onclick="agregarContacto()" data-es="+ Agregar Contacto" data-en="+ Add Contact">+ Agregar Contacto</button>

      <h2 class="center" data-es="Condiciones Médicas" data-en="Medical Conditions">Condiciones Médicas</h2>
      <div id="condiciones" class="stack"></div>
      <button type="button" onclick="agregarCondicion()" data-es="+ Agregar Condición" data-en="+ Add Condition">+ Agregar Condición</button>

      <div class="btns">
        <button type="submit" data-es="Guardar en Infomed" data-en="Save to Infomed">Guardar en Infomed</button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabase = supabase.createClient(
      "https://TU_PROJECT_URL.supabase.co",
      "TU_ANON_KEY"
    );

    let currentUser = null;

    async function signUp() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const { error } = await supabase.auth.signUp({ email, password });
      if (error) alert("❌ Error: " + error.message);
      else alert("✅ Registro exitoso en Infomed, revisa tu correo para confirmar.");
    }

    async function signIn() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) alert("❌ Error: " + error.message);
      else {
        currentUser = data.user;
        document.getElementById("auth-card").style.display = "none";
        document.getElementById("miFormulario").style.display = "block";
      }
    }

    function agregarContacto() {
      const div = document.createElement("div");
      div.className = "contact-card";
      div.innerHTML = `
        <input type="text" placeholder="Nombre en Español" class="contacto_es" data-es="Nombre en Español" data-en="Name in Spanish" required>
        <input type="text" placeholder="Nombre en Inglés" class="contacto_en" data-es="Nombre en Inglés" data-en="Name in English">
        <input type="tel" placeholder="Teléfono" class="contacto_tel" data-es="Teléfono" data-en="Phone">
      `;
      document.getElementById("contactos").appendChild(div);
    }

    function agregarCondicion() {
      const div = document.createElement("div");
      div.className = "contact-card";
      div.innerHTML = `
        <input type="text" placeholder="Título en Español" class="condicion_titulo_es" data-es="Título en Español" data-en="Title in Spanish" required>
        <input type="text" placeholder="Título en Inglés" class="condicion_titulo_en" data-es="Título en Inglés" data-en="Title in English">
        <input type="text" placeholder="Valor en Español" class="condicion_valor_es" data-es="Valor en Español" data-en="Value in Spanish">
        <input type="text" placeholder="Valor en Inglés" class="condicion_valor_en" data-es="Valor en Inglés" data-en="Value in English">
      `;
      document.getElementById("condiciones").appendChild(div);
    }

    document.getElementById("miFormulario").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!currentUser) {
        alert("Debes iniciar sesión primero.");
        return;
      }

      const nombre_es = document.getElementById("nombre_es").value;
      const nombre_en = document.getElementById("nombre_en").value;
      const cedula = document.getElementById("cedula").value;

      const { data: usuario, error: usuarioError } = await supabase
        .from("usuarios")
        .insert([{ uid: currentUser.id, nombre_es, nombre_en, cedula }])
        .select();

      if (usuarioError) {
        alert("❌ Error al guardar usuario: " + usuarioError.message);
        return;
      }

      const usuario_id = usuario[0].id;

      const contactos = document.querySelectorAll("#contactos .contact-card");
      for (let c of contactos) {
        const nombre_es = c.querySelector(".contacto_es").value;
        const nombre_en = c.querySelector(".contacto_en").value;
        const telefono = c.querySelector(".contacto_tel").value;
        await supabase.from("contactos").insert([{ usuario_id, nombre_es, nombre_en, telefono }]);
      }

      const condiciones = document.querySelectorAll("#condiciones .contact-card");
      for (let cond of condiciones) {
        const titulo_es = cond.querySelector(".condicion_titulo_es").value;
        const titulo_en = cond.querySelector(".condicion_titulo_en").value;
        const valor_es = cond.querySelector(".condicion_valor_es").value;
        const valor_en = cond.querySelector(".condicion_valor_en").value;
        await supabase.from("condiciones").insert([{ usuario_id, titulo_es, titulo_en, valor_es, valor_en }]);
      }

      alert("✅ Datos guardados correctamente en Infomed");
    });

    // Toggle de idioma
    document.getElementById("langToggle").addEventListener("change", function() {
      const isEnglish = this.checked;
      document.querySelectorAll("[data-es]").forEach(el => {
        if (el.tagName === "INPUT") {
          el.placeholder = isEnglish ? el.getAttribute("data-en") : el.getAttribute("data-es");
        } else {
          el.textContent = isEnglish ? el.getAttribute("data-en") : el.getAttribute("data-es");
        }
      });
    });
  </script>
</body>
</html>
