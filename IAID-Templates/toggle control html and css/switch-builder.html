<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Switch Builder PRO</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

</head>
<body>

<div class="app">

  <!-- PANEL -->
  <div class="panel">

    <h2>⚙️ Switch Builder</h2>

    <div class="group">
      <h4>🎨 Colores</h4>

      OFF <input type="color" id="bgOff">
      ON <input type="color" id="bgOn">
      Knob <input type="color" id="knobColor">

      Icon OFF <input type="color" id="iconOffColor">
      Icon ON <input type="color" id="iconOnColor">
    </div>

    <div class="group">
      <h4>📏 Tamaño</h4>

      Width <input type="range" id="width" min="60" max="200">
      Height <input type="range" id="height" min="30" max="100">
    </div>

    <div class="group">
      <h4>✨ Glow</h4>

      <label><input type="checkbox" id="glowPill"> Pill</label>
      Color <input type="color" id="glowPillColor">
      Intensity <input type="range" id="glowPillSize" min="0" max="40">

      <label><input type="checkbox" id="glowKnob"> Knob</label>
      Color <input type="color" id="glowKnobColor">
      Intensity <input type="range" id="glowKnobSize" min="0" max="40">
    </div>

    <div class="group">
      <h4>🎵 Iconos</h4>

      <a href="https://fontawesome.com/icons" target="_blank">FontAwesome</a>

      OFF <input id="iconOff" placeholder="fa-music">
      ON <input id="iconOn" placeholder="fa-face-smile">

      <hr>

      <button onclick="loadSVG()">📂 Cargar SVG</button>

      <div id="dropZone">Drop SVG aquí</div>

    </div>

    <div class="group">
      <h4>🎞 Animación</h4>

      <select id="animType">
        <option value="fade">Fade</option>
        <option value="scale">Scale</option>
        <option value="rotate">Rotate</option>
        <option value="flip">Flip</option>
      </select>

      Speed <input type="range" id="speed" min="0.1" max="1" step="0.1">
    </div>

    <div class="group">
      <h4>📦 Export</h4>

      <button onclick="copyHTML()">Copy HTML</button>
      <button onclick="copyCSS()">Copy CSS</button>
      <button onclick="copyJS()">Copy JS</button>
    </div>

  </div>

  <!-- PREVIEW -->
  <div class="preview">

    <label class="switch">
      <input type="checkbox" id="toggle">
      <div class="slider">
        <div class="knob">
          <i id="icon" class="fa-solid fa-music"></i>
        </div>
      </div>
    </label>

    <div class="code">
      <pre id="codeHTML"></pre>
      <pre id="codeCSS"></pre>
      <pre id="codeJS"></pre>
    </div>

  </div>

</div>
<style>

/* UI */
body{
  margin:0;
  font-family:Inter;
  background:#0c1117;
  color:white;
}

.app{
  display:flex;
  height:100vh;
}

.panel{
  width:320px;
  padding:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  overflow:auto;
}

.group{
  margin-bottom:20px;
}

.preview{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* SWITCH */

:root{
  --w:100px;
  --h:50px;

  --bg-off:#333;
  --bg-on:#00ffc3;

  --knob:#fff;

  --speed:0.3s;
}

.switch{
  position:relative;
  width:var(--w);
  height:var(--h);
}

.switch input{display:none;}

.slider{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:999px;
  background:var(--bg-off);
  transition:all var(--speed);
}

/* KNOB PERFECT CIRCLE */
.knob{
  position:absolute;
  width:calc(var(--h) - 8px);
  height:calc(var(--h) - 8px);
  top:4px;
  left:4px;

  background:var(--knob);
  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  transition:all var(--speed);
}

/* MOVE */
input:checked + .slider{
  background:var(--bg-on);
}

input:checked + .slider .knob{
  transform:translateX(calc(var(--w) - var(--h)));
}

/* ICON */
#icon{
  transition:all var(--speed);
}

/* ANIMATIONS */
.fade{opacity:1;}
.scale{transform:scale(1);}
.rotate{transform:rotate(0);}
.flip{transform:rotateY(0);}

input:checked + .slider .fade{opacity:0;}
input:checked + .slider .scale{transform:scale(0.5);}
input:checked + .slider .rotate{transform:rotate(180deg);}
input:checked + .slider .flip{transform:rotateY(180deg);}

#dropZone{
  border:2px dashed #aaa;
  padding:10px;
  text-align:center;
  margin-top:10px;
}

.code{
  margin-top:20px;
  width:80%;
}

pre{
  background:#111;
  padding:10px;
  overflow:auto;
}

</style>
<script>

/* ELEMENTOS */
const root = document.documentElement;
const toggle = document.getElementById("toggle");
const icon = document.getElementById("icon");

/* UPDATE */
function update(){

  root.style.setProperty('--bg-off', bgOff.value);
  root.style.setProperty('--bg-on', bgOn.value);
  root.style.setProperty('--knob', knobColor.value);

  root.style.setProperty('--w', width.value+"px");
  root.style.setProperty('--h', height.value+"px");

  root.style.setProperty('--speed', speed.value+"s");

  icon.className = animType.value + " fa-solid " + iconOff.value;
  icon.style.color = iconOffColor.value;

  toggle.onchange = () => {
    if(toggle.checked){
      icon.className = animType.value + " fa-solid " + iconOn.value;
      icon.style.color = iconOnColor.value;
    }else{
      icon.className = animType.value + " fa-solid " + iconOff.value;
      icon.style.color = iconOffColor.value;
    }
  };

  /* GLOW */
  const slider = document.querySelector(".slider");
  const knob = document.querySelector(".knob");

  slider.style.boxShadow = glowPill.checked ?
    `0 0 ${glowPillSize.value}px ${glowPillColor.value}` : "none";

  knob.style.boxShadow = glowKnob.checked ?
    `0 0 ${glowKnobSize.value}px ${glowKnobColor.value}` : "none";

  save();
  generateCode();
}

/* SAVE */
function save(){
  let data={};
  document.querySelectorAll("input,select").forEach(e=>{
    data[e.id]=e.value;
  });
  localStorage.setItem("switchBuilder",JSON.stringify(data));
}

/* LOAD */
window.onload=()=>{
  const data = JSON.parse(localStorage.getItem("switchBuilder")||"{}");
  Object.keys(data).forEach(k=>{
    if(document.getElementById(k)){
      document.getElementById(k).value=data[k];
    }
  });
  update();
};

/* EVENTS */
document.querySelectorAll("input,select").forEach(e=>{
  e.addEventListener("input",update);
});

/* SVG LOAD */
function loadSVG(){
  let input = document.createElement("input");
  input.type="file";
  input.accept=".svg";
  input.onchange = e=>{
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = () => {
      icon.outerHTML = reader.result;
    };
    reader.readAsText(file);
  };
  input.click();
}

/* DRAG DROP */
const drop = document.getElementById("dropZone");

drop.ondragover = e=>{e.preventDefault();}
drop.ondrop = e=>{
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  const reader = new FileReader();
  reader.onload = ()=>{ icon.outerHTML = reader.result; };
  reader.readAsText(file);
};

/* EXPORT */
function generateCode(){
  document.getElementById("codeHTML").textContent =
    document.querySelector(".switch").outerHTML;

  document.getElementById("codeCSS").textContent =
    document.querySelector("style").innerText;

  document.getElementById("codeJS").textContent =
    "/* JS generado */";
}

function copyHTML(){
  navigator.clipboard.writeText(document.getElementById("codeHTML").textContent);
}
function copyCSS(){
  navigator.clipboard.writeText(document.getElementById("codeCSS").textContent);
}
function copyJS(){
  navigator.clipboard.writeText(document.getElementById("codeJS").textContent);
}

</script>
</body>
</html>
