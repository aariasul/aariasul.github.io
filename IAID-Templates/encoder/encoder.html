<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Navigation Encoder</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f4f4f4;
}
.section {
    background: #fff;
    padding: 20px;
    border-radius: 8px;
}
input, textarea {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
}
button {
    padding: 10px 15px;
    cursor: pointer;
}
.output {
    background: #eee;
    padding: 10px;
    margin-top: 10px;
    word-break: break-all;
}
.copy-btn {
    background: #4CAF50;
    color: white;
    border: none;
    margin-top: 5px;
}
</style>
</head>

<body>

<div class="section">
<h2>Smart Navigation Link Generator</h2>

<label>Google Maps Link</label>
<input type="text" id="gmapsLink" placeholder="Paste Google Maps share link">

<label>Plus Code</label>
<input type="text" id="plusCode" placeholder="Example: WX7C+MC Curridabat">

<label>Full Address</label>
<input type="text" id="address" placeholder="Example: Edificio Cluster Pinares Curridabat Costa Rica">

<label>Latitude,Longitude</label>
<input type="text" id="coords" placeholder="Example: 9.9153,-84.0254">

<button onclick="generateSmartLink()">Generate Smart Navigation Link</button>

<div class="output" id="result"></div>
<button class="copy-btn" onclick="copyResult()">Copy Link</button>

</div>

<script>

function extractCoords(url) {
    const regex = /@(-?\d+\.\d+),(-?\d+\.\d+)/;
    const match = url.match(regex);
    if (match) return match[1] + "," + match[2];
    return null;
}

function generateSmartLink() {
    let destination = "";
    const gmaps = document.getElementById("gmapsLink").value.trim();
    const plusCode = document.getElementById("plusCode").value.trim();
    const address = document.getElementById("address").value.trim();
    const coords = document.getElementById("coords").value.trim();

    if (gmaps) {
        const extracted = extractCoords(gmaps);
        destination = extracted ? extracted : gmaps;
    } else if (coords) {
        destination = coords;
    } else if (plusCode) {
        destination = plusCode;
    } else if (address) {
        destination = address;
    } else {
        alert("Please enter location information.");
        return;
    }

    const encoded = encodeURIComponent(destination);

    const finalLink = `https://inter-activeid.com/IAID-Templates/encoder/encoder.html?navigate=${encoded}`;

    document.getElementById("result").innerText = finalLink;
}

function copyResult() {
    const text = document.getElementById("result").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}

/* SMART REDIRECT LOGIC */
(function() {

    const params = new URLSearchParams(window.location.search);
    const dest = params.get("navigate");

    if (!dest) return;

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const isAndroid = /Android/.test(navigator.userAgent);

    const googleApp = "comgooglemaps://?daddr=" + dest + "&directionsmode=driving";
    const googleWeb = "https://www.google.com/maps/dir/?api=1&destination=" + dest;
    const waze = "https://waze.com/ul?q=" + dest + "&navigate=yes";
    const apple = "http://maps.apple.com/?daddr=" + dest;

    let start = Date.now();

    if (isIOS) {
        window.location = googleApp;
        setTimeout(() => {
            if (Date.now() - start < 2000) {
                window.location = waze;
                setTimeout(() => {
                    window.location = apple;
                }, 1500);
            }
        }, 1500);
    }

    else if (isAndroid) {
        window.location = googleWeb;
        setTimeout(() => {
            window.location = waze;
        }, 1500);
    }

    else {
        window.location = googleWeb;
    }

})();
</script>

</body>
</html>
