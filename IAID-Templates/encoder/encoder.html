<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Navigation Encoder</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f4f4f4;
}
.section {
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 20px;
}
input, textarea {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
}
button {
    padding: 10px 15px;
    cursor: pointer;
}
.output {
    background: #eee;
    padding: 10px;
    margin-top: 10px;
    word-break: break-all;
}
.copy-btn {
    background: #4CAF50;
    color: white;
    border: none;
    margin-top: 5px;
}
</style>
</head>

<body>

<div class="section">
<h2>Universal Navigation Encoder</h2>

<label>Google Maps Link (optional)</label>
<input type="text" id="gmapsLink" placeholder="Paste Google Maps share link">

<label>Plus Code (optional)</label>
<input type="text" id="plusCode" placeholder="Example: WX7C+MC Curridabat">

<label>Full Address (optional)</label>
<input type="text" id="address" placeholder="Example: Edificio Cluster Pinares Curridabat Costa Rica">

<label>OR Latitude,Longitude (optional)</label>
<input type="text" id="coords" placeholder="Example: 9.9153,-84.0254">

<button onclick="generateLink()">Generate Smart Navigation Link</button>

<div class="output" id="result"></div>
<button class="copy-btn" onclick="copyResult()">Copy Link</button>

</div>

<script>

function extractCoordsFromGoogleURL(url) {
    const regex = /@(-?\d+\.\d+),(-?\d+\.\d+)/;
    const match = url.match(regex);
    if (match) {
        return match[1] + "," + match[2];
    }
    return null;
}

function generateLink() {
    let coords = "";
    const gmaps = document.getElementById("gmapsLink").value.trim();
    const plusCode = document.getElementById("plusCode").value.trim();
    const address = document.getElementById("address").value.trim();
    const manualCoords = document.getElementById("coords").value.trim();

    if (gmaps) {
        coords = extractCoordsFromGoogleURL(gmaps);
        if (!coords) {
            alert("Could not extract coordinates from Google Maps link.");
            return;
        }
    } else if (manualCoords) {
        coords = manualCoords;
    } else if (plusCode) {
        coords = plusCode;
    } else if (address) {
        coords = address;
    } else {
        alert("Please provide location information.");
        return;
    }

    const encoded = encodeURIComponent(coords);

    const smartLink = `
https://yourdomain.com/navigate.html?dest=${encoded}
`;

    document.getElementById("result").innerText = smartLink.trim();
}

function copyResult() {
    const text = document.getElementById("result").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}

</script>

</body>
</html>
